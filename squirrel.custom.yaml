patch:
  app_options:
  style:
    color_scheme: everforest
    candidate_list_layout: linear
    inline_preedit: true    # 在文本框顯示輸入串
    inline_candidate: false # 在文本框顯示首選項
    # layout
    align_type: center
    border_width: 1
    candidate_spacing: 8
    corner_radius: 4
    hilite_padding: 2
    hilite_spacing: 2
    margin_x: 8
    margin_y: 8
    max_height: 0
    max_width: 0
    min_height: 0
    min_width: 0
    round_corner: 4
    shadow_offset_x: 4
    shadow_offset_y: 4
    shadow_radius: 0
    spacing: 10

  preset_color_schemes/everforest:
    author: Dec
    name: Everforest
    # color
    border_color: 0xD8EBF0         # 边框
    back_color: 0xE3F6FD           # 背景
    text_color: 0x726A5C           # 内嵌
    label_color: 0x2E82F5          # 序号
    comment_text_color: 0x01A18D   # 注释
    candidate_text_color: 0x726A5C # 候选
    hilited_back_color: 0xD8EBF0
    hilited_text_color: 0x726A5C
    hilited_label_color: 0x2E82F5
    hilited_comment_text_color: 0x01A18D
    hilited_candidate_text_color: 0x726A5C

